<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Переходник</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Убирает синюю рамку при нажатии на мобилках */
        }

        body {
            background-color: #000000;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Unbounded', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #snowCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .button-stack {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px; /* Чуть меньше зазор на мобилках */
            width: 90%;
            max-width: 650px;
        }

        .aero-btn {
            text-decoration: none;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px) saturate(160%); /* Снизил блюр для производительности мобилок */
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 30px 25px; /* Уменьшил паддинги */
            border-radius: 20px;
            font-size: 14px; /* Базовый размер шрифта */
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 0.5px;
            line-height: 1.4;
            transition: border-color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Адаптация под маленькие экраны */
        @media (max-width: 480px) {
            .aero-btn {
                padding: 25px 20px;
                font-size: 12px; /* Меньше текст, чтобы не раздувало кнопку */
                border-radius: 18px;
            }
            .button-stack {
                gap: 12px;
            }
        }

        /* Адаптация под планшеты/ПК */
        @media (min-width: 768px) {
            .aero-btn {
                padding: 35px 40px;
                font-size: 15px;
            }
            .button-stack {
                gap: 20px;
            }
        }

        .aero-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <canvas id="snowCanvas"></canvas>

    <div class="button-stack">
        <a href="https://t.me/+X4BK9AHHYINiZTFi" class="aero-btn" target="_blank">
            Перейти в мой высокоинтеллектуальный телеграм канал
        </a>

        <a href="https://steamcommunity.com/id/e2wav" class="aero-btn" target="_blank">
            Мой стим профиль
        </a>
    </div>

    <script>
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, flakes;

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            // Оптимизация количества снежинок: на мобилках их будет меньше
            const isMobile = width < 768;
            const flakeCount = isMobile ? 80 : 180;

            flakes = [];
            for (let i = 0; i < flakeCount; i++) {
                flakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * (isMobile ? 1.5 : 2.5) + 0.5, 
                    v: Math.random() * 0.7 + 0.2,
                    o: Math.random() * 0.7
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < flakes.length; i++) {
                let f = flakes[i];
                ctx.fillStyle = `rgba(255, 255, 255, ${f.o})`;
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);
                ctx.fill();
            }
            update();
        }

        function update() {
            for (let i = 0; i < flakes.length; i++) {
                let f = flakes[i];
                f.y += f.v;
                if (f.y > height) {
                    flakes[i].y = -10;
                    flakes[i].x = Math.random() * width;
                }
            }
        }

        // Ограничение частоты перерисовки при ресайзе (debounce)
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(init, 200);
        });

        init();

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приватный доступ</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2.5rem; border-radius: 1rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); text-align: center; width: 100%; max-width: 400px; border: 1px solid #334155; }
        h1 { margin-bottom: 0.5rem; font-size: 1.5rem; color: #38bdf8; }
        p { color: #94a3b8; margin-bottom: 2rem; font-size: 0.9rem; }
        input { width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #334155; background: #0f172a; color: white; font-size: 1.1rem; text-align: center; margin-bottom: 1rem; box-sizing: border-box; outline: none; }
        input:focus { border-color: #38bdf8; }
        button { width: 100%; padding: 0.75rem; background: #0ea5e9; color: white; border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0284c7; }
        #msg { margin-top: 1rem; font-size: 0.85rem; min-height: 1.2rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>Доступ по коду</h1>
    <p>Получите одноразовый код в Telegram-боте</p>
    <input type="text" id="codeInput" placeholder="Введите ваш код">
    <button id="btnEnter">Войти в систему</button>
    <div id="msg"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, get, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWlH7XpQPu6jQhss5VUvyTfCtQvr6fA5o",
        authDomain: "klowreez.firebaseapp.com",
        databaseURL: "https://klowreez-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "klowreez",
        storageBucket: "klowreez.firebasestorage.app",
        messagingSenderId: "162324945366",
        appId: "1:162324945366:web:d1bae9d7e60a53930eac77",
        measurementId: "G-H3GSWPQ7WH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const input = document.getElementById('codeInput');
    const btn = document.getElementById('btnEnter');
    const msg = document.getElementById('msg');

    btn.addEventListener('click', async () => {
        const code = input.value.trim();
        if (!code) {
            showMsg("Пожалуйста, введите код", "#fbbf24");
            return;
        }

        showMsg("Проверка...", "#94a3b8");

        const codeRef = ref(db, 'active_codes/' + code);
        
        try {
            const snapshot = await get(codeRef);
            if (snapshot.exists()) {
                showMsg("Доступ разрешен! Перенаправляем...", "#4ade80");
                await remove(codeRef); // Удаляем, чтобы код нельзя было использовать дважды
                
                setTimeout(() => {
                    // Куда редиректим после входа
                    window.location.href = "welcome.html"; 
                }, 1500);
            } else {
                showMsg("Неверный или просроченный код", "#f87171");
            }
        } catch (e) {
            showMsg("Ошибка базы данных. Проверьте Rules!", "#f87171");
            console.error(e);
        }
    });

    function showMsg(text, color) {
        msg.innerText = text;
        msg.style.color = color;
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klowreez System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #000000;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.02);
            --blur: blur(30px);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--accent);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
        }

        .container {
            width: 100%;
            max-width: 380px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            text-align: center;
            box-sizing: border-box;
        }

        #login-page { display: none; animation: fadeIn 1s ease; }
        h1 { font-weight: 600; letter-spacing: -1px; margin: 0 0 10px 0; font-size: 24px; }
        p { font-weight: 300; color: #555; font-size: 14px; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: #fff;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }
        input:focus { border-color: rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.06); }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 18px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { transform: scale(0.98); opacity: 0.9; }

        #status { margin-top: 20px; font-size: 11px; color: #444; letter-spacing: 1px; text-transform: uppercase; }

        #main-page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            width: 100%;
            padding: 40px 0;
            box-sizing: border-box;
        }

        /* ИСПРАВЛЕННАЯ НАВИГАЦИЯ */
        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.4;
            transition: 0.3s;
            cursor: pointer; /* Пальчик при наведении */
        }
        nav a:hover { opacity: 1; }

        .logo-box {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-box img {
            max-width: 200px;
            height: auto;
            animation: logoAppear 2.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes logoAppear {
            from { opacity: 0; filter: blur(20px); transform: scale(0.9); }
            to { opacity: 1; filter: blur(0); transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="login-page" class="container">
        <h1>Verify</h1>
        <p>Enter your access key</p>
        <input type="text" id="codeInp" placeholder="KEY">
        <button id="checkBtn">Access System</button>
        <div id="status">Ready</div>
    </div>

    <div id="main-page">
        <nav><a onclick="location.reload()">Главная</a></nav>
        <div class="logo-box">
            <img src="logo.png" alt="" onerror="this.style.display='none'">
        </div>
        <div style="height: 20px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWlH7XpQPu6jQhss5VUvyTfCtQvr6fA5o",
            authDomain: "klowreez.firebaseapp.com",
            databaseURL: "https://klowreez-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "klowreez",
            storageBucket: "klowreez.firebasestorage.app",
            messagingSenderId: "162324945366",
            appId: "1:162324945366:web:d1bae9d7e60a53930eac77"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const loginSec = document.getElementById('login-page');
        const mainSec = document.getElementById('main-page');
        const status = document.getElementById('status');

        if (localStorage.getItem('isAuthorized') === 'true') {
            mainSec.style.display = 'flex';
        } else {
            loginSec.style.display = 'block';
        }

        document.getElementById('checkBtn').onclick = async () => {
            const code = document.getElementById('codeInp').value.trim();
            if (!code) return;

            status.innerText = "Connecting...";
            const codeRef = ref(db, 'active_codes/' + code);

            try {
                const snap = await get(codeRef);
                if (snap.exists()) {
                    status.innerText = "Success";
                    localStorage.setItem('isAuthorized', 'true');
                    loginSec.style.transition = "0.5s";
                    loginSec.style.opacity = "0";
                    setTimeout(() => {
                        loginSec.style.display = "none";
                        mainSec.style.display = "flex";
                    }, 500);
                } else {
                    status.innerText = "Invalid Key";
                    status.style.color = "#ff4444";
                }
            } catch (err) {
                console.error(err);
                status.innerText = "Error: Check Console";
            }
        };
    </script>
</body>
</html>

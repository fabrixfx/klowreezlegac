<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project93 by e93</title>
    
    <script src="https://unpkg.com/lenis@1.1.5/dist/lenis.min.js"></script>

    <style>
        :root {
            --bg: #000;
            --fg: #fff;
            --muted: #bdbdbd;
            --line: #2a2a2a;
            --panel: #0d0d0d;
            --accent: #fff;
            --shadow: 0 0 0 1px rgba(255, 255, 255, .06), 0 20px 50px rgba(255, 255, 255, .03);
        }

        /* --- ТЕМНЫЙ ЛЕДЯНОЙ ПОЛЗУНОК --- */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #1a1a1a; 
            border-radius: 10px;
            border: 1px solid #2a2a2a;
            transition: all 0.3s ease;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #252525;
            border-color: #444;
        }

        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }

        /* --- ДИЗАЙН СТРАНИЦЫ --- */
        * { box-sizing: border-box }
        html { scroll-behavior: smooth }
        
        body {
            margin: 0;
            font-family: Inter, Arial, Helvetica, sans-serif;
            color: var(--fg);
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, .06), transparent 28%),
                radial-gradient(circle at 80% 0%, rgba(255, 255, 255, .04), transparent 25%),
                linear-gradient(180deg, #050505 0%, #000 100%);
            line-height: 1.65;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, .03) 1px, transparent 1px);
            background-size: 28px 28px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, .25), rgba(0, 0, 0, .7));
            animation: gridShift 18s linear infinite;
            opacity: .22;
        }

        @keyframes gridShift {
            from { transform: translateY(0) }
            to { transform: translateY(28px) }
        }

        .wrap {
            max-width: 980px;
            margin: 0 auto;
            padding: 48px 20px 100px;
            position: relative;
            z-index: 1;
        }

        .hero {
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .015));
            box-shadow: var(--shadow);
            border-radius: 24px;
            padding: 42px 32px;
            position: relative;
            overflow: hidden;
            animation: fadeUp .9s ease both;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: -40%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 255, 255, .08), transparent 25%);
            animation: spin 18s linear infinite;
            opacity: .35;
        }

        .hero > * { position: relative; z-index: 1 }

        @keyframes spin { to { transform: rotate(360deg) } }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px) }
            to { opacity: 1; transform: translateY(0) }
        }

        h1 {
            margin: 0 0 6px;
            font-size: clamp(2rem, 4vw, 3.4rem);
            letter-spacing: .02em;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--muted);
            font-size: 1rem;
            margin: 0;
        }

        .toc {
            margin: 26px 0 0;
            padding: 18px 20px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255, 255, 255, .025);
        }

        .toc h2 {
            margin: 0 0 10px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        .toc ol {
            margin: 0;
            padding-left: 18px;
        }

        .toc a {
            color: #f4f4f4;
            text-decoration: none;
            border-bottom: 1px dashed rgba(255, 255, 255, .25);
        }

        .section {
            margin-top: 24px;
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(255, 255, 255, .025), rgba(255, 255, 255, .01));
            border-radius: 22px;
            padding: 26px 24px;
            box-shadow: var(--shadow);
            animation: fadeUp .8s ease both;
        }

        .section h2 {
            margin: 0 0 12px;
            font-size: 1.25rem;
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .note {
            padding: 14px 16px;
            border-left: 3px solid #fff;
            background: rgba(255, 255, 255, .04);
            color: #f0f0f0;
            border-radius: 10px;
            margin: 12px 0 8px;
        }

        ul { padding-left: 20px; }
        li { margin: 8px 0; }

        .footer {
            margin-top: 26px;
            text-align: center;
            color: var(--muted);
            font-size: .92rem;
        }

        .stamp {
            display: inline-block;
            margin-top: 10px;
            border: 1px solid #4a4a4a;
            padding: 8px 12px;
            border-radius: 999px;
            letter-spacing: .14em;
            text-transform: uppercase;
            background: rgba(255, 255, 255, .02);
            animation: pulse 2.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, .08) }
            50% { box-shadow: 0 0 0 10px rgba(255, 255, 255, 0) }
        }

        .toplink {
            position: fixed;
            right: 18px;
            bottom: 18px;
            color: #fff;
            text-decoration: none;
            border: 1px solid #444;
            background: rgba(0, 0, 0, .7);
            padding: 12px 14px;
            border-radius: 999px;
            backdrop-filter: blur(8px);
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="wrap" id="top">
        <header class="hero">
            <h1>Project93 by e93 / e2.cc </h1>
            
            <div class="toc">
                <h2>Навигация</h2>
                <ol>
                    <li><a href="#s1">О проекте</a></li>
                </ol>
            </div>
        </header>

        <section class="section" id="s1">
            <h2>1. О проекте</h2>
            <div class="note">Скоро</div>
        </section>

    <a class="toplink" href="#top">Наверх</a>

    <script>
        const lenis = new Lenis({
            duration: 1.8, // Оставил очень плавным
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            smoothWheel: true,
            wheelMultiplier: 1.0
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
    </script>
</body>
</html>
